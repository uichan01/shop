spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/shop_db
      ?useSSL=false
      &useUnicode=true
      &serverTimezone=Asia/Seoul
      &allowPublicKeyRetrieval=true
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jwt:
    secret: asdjfklajsdqwrqwrmzxcvioaaaaawww

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.example.shop
  configuration:
    default-statement-timeout: 30
    map-underscore-to-camel-case: true